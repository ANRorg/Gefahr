listeners:
  - address: ":8080"

admin:
  address: "127.0.0.1:9090"
  # Set this in production and export the named variable with a bearer token.
  # The built-in healthcheck reads GOPROXY_ADMIN_TOKEN automatically.
  # auth_token_env: GOPROXY_ADMIN_TOKEN
  # Additional scoped tokens let monitoring read health/metrics without using
  # the full operator token.
  # tokens:
  #   - name: monitor
  #     env: GOPROXY_MONITOR_TOKEN
  #     scopes:
  #       - read

routes:
  - name: api
    host: localhost
    path_prefix: /
    pool: api
    strategy: round_robin
    cache:
      enabled: true
    policy:
      allowed_methods:
        - GET
        - HEAD
        - POST
      denied_path_prefixes:
        - /internal
        - /debug
      required_headers: []
      denied_headers:
        - X-Debug-Bypass
      max_query_bytes: 4096
    rate_limit:
      enabled: true
      requests: 300
      window: 1m
      max_keys: 10000

pools:
  api:
    backends:
      - name: api-1
        url: http://127.0.0.1:9001
      - name: api-2
        url: http://127.0.0.1:9002
    health:
      path: /health
      interval: 5s
      timeout: 1s
      unhealthy_threshold: 2
      healthy_threshold: 1
    retry:
      max_attempts: 2
    # For HTTPS upstreams, uncomment and mount the referenced files.
    # tls:
    #   ca_file: /etc/goproxy/upstream-ca.pem
    #   server_name: api.internal
    #   client_cert_file: /etc/goproxy/upstream-client.crt
    #   client_key_file: /etc/goproxy/upstream-client.key

timeouts:
  read_header: 10s
  read_body: 30s
  write: 2m
  idle: 60s
  shutdown: 30s
  dial: 5s
  response_header: 30s

limits:
  max_header_bytes: 16384
  max_body_bytes: 10485760
  max_concurrent_requests: 1024
  max_connections: 4096

# Configure this only when Gefahr is behind a trusted ingress or load balancer
# that sanitizes and sets these headers.
# client_ip:
#   trusted_proxies:
#     - 10.0.0.0/8
#   headers:
#     - X-Forwarded-For
#     - X-Real-IP

cache:
  max_entries: 1000
  max_bytes: 67108864
  default_ttl: 30s

logging:
  level: info
