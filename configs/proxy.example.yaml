listeners:
  - address: ":8080"

admin:
  address: "127.0.0.1:9090"

routes:
  - name: api
    host: localhost
    path_prefix: /
    pool: api
    strategy: round_robin
    cache:
      enabled: true

pools:
  api:
    backends:
      - name: api-1
        url: http://127.0.0.1:9001
      - name: api-2
        url: http://127.0.0.1:9002
    health:
      path: /health
      interval: 5s
      timeout: 1s
      unhealthy_threshold: 2
      healthy_threshold: 1
    retry:
      max_attempts: 2

timeouts:
  read_header: 10s
  read_body: 30s
  write: 2m
  idle: 60s
  shutdown: 30s
  dial: 5s
  response_header: 30s

limits:
  max_header_bytes: 16384
  max_body_bytes: 10485760

cache:
  max_entries: 1000
  max_bytes: 67108864
  default_ttl: 30s

logging:
  level: info
