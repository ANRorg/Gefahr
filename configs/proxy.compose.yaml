listeners:
  - address: ":8080"
admin:
  address: ":9090"
routes:
  - name: demo
    host: localhost
    path_prefix: /
    pool: demo
    strategy: round_robin
    cache:
      enabled: true
pools:
  demo:
    backends:
      - name: backend-1
        url: http://backend-1:9001
      - name: backend-2
        url: http://backend-2:9002
    health:
      path: /health
      interval: 5s
      timeout: 1s
      unhealthy_threshold: 2
      healthy_threshold: 1
    retry:
      max_attempts: 2
timeouts:
  read_header: 10s
  read_body: 30s
  write: 2m
  idle: 60s
  shutdown: 30s
  dial: 5s
  response_header: 30s
limits:
  max_header_bytes: 16384
  max_body_bytes: 10485760
cache:
  max_entries: 1000
  max_bytes: 67108864
  default_ttl: 30s
logging:
  level: info
