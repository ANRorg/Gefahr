name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Verify source and tests
        run: make acceptance
      - name: Scan known Go vulnerabilities
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false
      - name: Build release binary
        run: make build VERSION=ci COMMIT=${GITHUB_SHA::12}

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Build runtime image
        run: docker build --target runtime --build-arg VERSION=ci --build-arg COMMIT=${GITHUB_SHA::12} --tag goproxy:ci .
      - name: Verify image metadata
        run: docker run --rm goproxy:ci -version
