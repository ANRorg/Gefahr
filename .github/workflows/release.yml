name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build archives and checksums
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist/stage
          release_version="${VERSION#v}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos=${target%/*}
            goarch=${target#*/}
            asset="gefahr_${release_version}_${goos}_${goarch}"
            binary=goproxy
            if [ "$goos" = windows ]; then
              binary=goproxy.exe
            fi
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=$VERSION -X main.commit=${COMMIT:0:12}" \
              -o "dist/stage/$binary" ./cmd/goproxy
            if [ "$goos" = windows ]; then
              zip -j "dist/$asset.zip" "dist/stage/$binary"
            else
              tar -C dist/stage -czf "dist/$asset.tar.gz" "$binary"
            fi
            if [ "$goos" = linux ]; then
              deb_arch=$goarch
              if [ "$goarch" = amd64 ]; then
                deb_arch=amd64
              elif [ "$goarch" = arm64 ]; then
                deb_arch=arm64
              fi
              pkgroot="dist/package/$asset"
              install -Dm755 "dist/stage/$binary" "$pkgroot/usr/bin/goproxy"
              install -Dm644 configs/proxy.example.yaml "$pkgroot/etc/goproxy/proxy.example.yaml"
              install -Dm644 deploy/systemd/goproxy.service "$pkgroot/lib/systemd/system/goproxy.service"
              sed -i 's#/usr/local/bin/goproxy#/usr/bin/goproxy#' "$pkgroot/lib/systemd/system/goproxy.service"
              install -Dm644 deploy/systemd/goproxy.env.example "$pkgroot/etc/goproxy/goproxy.env.example"
              install -Dm644 LICENSE "$pkgroot/usr/share/doc/gefahr/LICENSE"
              mkdir -p "$pkgroot/DEBIAN"
              cat > "$pkgroot/DEBIAN/control" <<EOF
          Package: gefahr
          Version: $release_version
          Section: web
          Priority: optional
          Architecture: $deb_arch
          Maintainer: Gefahr maintainers <noreply@github.com>
          Homepage: https://github.com/${GITHUB_REPOSITORY}
          Description: Configurable Go reverse proxy
           Gefahr is a production-minded reverse proxy with host/path routing,
           health checks, request policy guardrails, rate limiting, caching,
           structured logs, and Prometheus metrics.
          EOF
              cat > "$pkgroot/DEBIAN/postinst" <<'EOF'
          #!/bin/sh
          set -e
          if ! getent group goproxy >/dev/null; then
            addgroup --system goproxy >/dev/null
          fi
          if ! id -u goproxy >/dev/null 2>&1; then
            adduser --system --no-create-home --ingroup goproxy --home /var/lib/goproxy --shell /usr/sbin/nologin goproxy >/dev/null
          fi
          if command -v systemctl >/dev/null 2>&1; then
            systemctl daemon-reload || true
          fi
          EOF
              chmod 0755 "$pkgroot/DEBIAN/postinst"
              dpkg-deb --build --root-owner-group "$pkgroot" "dist/$asset.deb"
            fi
            rm "dist/stage/$binary"
          done
          rmdir dist/stage
          rm -rf dist/package
          darwin_amd64_sha=$(sha256sum "dist/gefahr_${release_version}_darwin_amd64.tar.gz" | awk '{print $1}')
          darwin_arm64_sha=$(sha256sum "dist/gefahr_${release_version}_darwin_arm64.tar.gz" | awk '{print $1}')
          linux_amd64_sha=$(sha256sum "dist/gefahr_${release_version}_linux_amd64.tar.gz" | awk '{print $1}')
          linux_arm64_sha=$(sha256sum "dist/gefahr_${release_version}_linux_arm64.tar.gz" | awk '{print $1}')
          cat > dist/gefahr.rb <<EOF
          class Gefahr < Formula
            desc "Configurable Go reverse proxy"
            homepage "https://github.com/${GITHUB_REPOSITORY}"
            version "$release_version"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/$VERSION/gefahr_${release_version}_darwin_arm64.tar.gz"
                sha256 "$darwin_arm64_sha"
              else
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/$VERSION/gefahr_${release_version}_darwin_amd64.tar.gz"
                sha256 "$darwin_amd64_sha"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/$VERSION/gefahr_${release_version}_linux_arm64.tar.gz"
                sha256 "$linux_arm64_sha"
              else
                url "https://github.com/${GITHUB_REPOSITORY}/releases/download/$VERSION/gefahr_${release_version}_linux_amd64.tar.gz"
                sha256 "$linux_amd64_sha"
              end
            end

            def install
              bin.install "goproxy"
            end

            test do
              assert_match "goproxy version=#{version}", shell_output("#{bin}/goproxy -version")
            end
          end
          EOF
      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/goproxy.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum gefahr_* gefahr.rb goproxy.spdx.json > checksums.txt)
      - name: Attest binary provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/gefahr_*.tar.gz
            dist/gefahr_*.zip
            dist/gefahr_*.deb
            dist/gefahr.rb
      - name: Attest binary SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/gefahr_*.tar.gz
            dist/gefahr_*.zip
            dist/gefahr_*.deb
            dist/gefahr.rb
          sbom-path: dist/goproxy.spdx.json
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign release files
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f \( -name 'gefahr_*' -o -name 'gefahr.rb' -o -name 'checksums.txt' -o -name 'goproxy.spdx.json' \) -print0 |
            sort -z |
            while IFS= read -r -d '' artifact; do
              cosign sign-blob --yes \
                --output-signature "$artifact.sig" \
                --output-certificate "$artifact.pem" \
                "$artifact"
            done
      - name: Create release when absent
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            exit 0
          fi
          prerelease_flag=()
          if [[ "$REF_NAME" == *-* ]]; then
            prerelease_flag+=(--prerelease)
          fi
          gh release create "$REF_NAME" --verify-tag --generate-notes --title "Gefahr $REF_NAME" "${prerelease_flag[@]}"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
      - name: Publish Homebrew tap
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_REPOSITORY:-}" ] || [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "Homebrew tap publication skipped; HOMEBREW_TAP_REPOSITORY or HOMEBREW_TAP_TOKEN is not configured."
            exit 0
          fi
          workdir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "$workdir/tap"
          mkdir -p "$workdir/tap/Formula"
          cp dist/gefahr.rb "$workdir/tap/Formula/gefahr.rb"
          cd "$workdir/tap"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gefahr.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already contains $GITHUB_REF_NAME."
            exit 0
          fi
          git commit -m "Update Gefahr $GITHUB_REF_NAME"
          git push
      - name: Publish apt repository
        env:
          APT_REPO_REPOSITORY: ${{ vars.APT_REPO_REPOSITORY }}
          APT_REPO_TOKEN: ${{ secrets.APT_REPO_TOKEN }}
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
          APT_REPO_GPG_PASSPHRASE: ${{ secrets.APT_REPO_GPG_PASSPHRASE }}
          APT_REPO_DISTRIBUTION: ${{ vars.APT_REPO_DISTRIBUTION }}
          APT_REPO_COMPONENT: ${{ vars.APT_REPO_COMPONENT }}
        run: |
          set -euo pipefail
          if [ -z "${APT_REPO_REPOSITORY:-}" ] || [ -z "${APT_REPO_TOKEN:-}" ] || [ -z "${APT_REPO_GPG_PRIVATE_KEY:-}" ]; then
            echo "Apt repository publication skipped; APT_REPO_REPOSITORY, APT_REPO_TOKEN, or APT_REPO_GPG_PRIVATE_KEY is not configured."
            exit 0
          fi
          distribution="${APT_REPO_DISTRIBUTION:-stable}"
          component="${APT_REPO_COMPONENT:-main}"
          if ! command -v dpkg-scanpackages >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y dpkg-dev
          fi
          workdir="$(mktemp -d)"
          git clone "https://x-access-token:${APT_REPO_TOKEN}@github.com/${APT_REPO_REPOSITORY}.git" "$workdir/repo"
          cd "$workdir/repo"
          mkdir -p pool/main/g/gefahr
          cp "$GITHUB_WORKSPACE"/dist/*.deb pool/main/g/gefahr/
          for arch in amd64 arm64; do
            package_dir="dists/$distribution/$component/binary-$arch"
            mkdir -p "$package_dir"
            dpkg-scanpackages --arch "$arch" pool > "$package_dir/Packages"
            gzip -9kf "$package_dir/Packages"
          done
          release_dir="dists/$distribution"
          {
            echo "Origin: Gefahr"
            echo "Label: Gefahr"
            echo "Suite: $distribution"
            echo "Codename: $distribution"
            echo "Date: $(date -Ru)"
            echo "Architectures: amd64 arm64"
            echo "Components: $component"
            echo "Description: Gefahr package repository"
            echo "MD5Sum:"
            find "$release_dir" -type f \( -name Packages -o -name Packages.gz \) | sort | while read -r file; do
              rel="${file#$release_dir/}"
              printf " %s %16s %s\n" "$(md5sum "$file" | awk '{print $1}')" "$(wc -c < "$file")" "$rel"
            done
            echo "SHA256:"
            find "$release_dir" -type f \( -name Packages -o -name Packages.gz \) | sort | while read -r file; do
              rel="${file#$release_dir/}"
              printf " %s %16s %s\n" "$(sha256sum "$file" | awk '{print $1}')" "$(wc -c < "$file")" "$rel"
            done
          } > "$release_dir/Release"
          export GNUPGHOME="$workdir/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$APT_REPO_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg_args=(--batch --yes --pinentry-mode loopback)
          if [ -n "${APT_REPO_GPG_PASSPHRASE:-}" ]; then
            gpg_args+=(--passphrase "$APT_REPO_GPG_PASSPHRASE")
          fi
          gpg "${gpg_args[@]}" --clearsign -o "$release_dir/InRelease" "$release_dir/Release"
          gpg "${gpg_args[@]}" -abs -o "$release_dir/Release.gpg" "$release_dir/Release"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pool dists
          if git diff --cached --quiet; then
            echo "Apt repository already contains $GITHUB_REF_NAME."
            exit 0
          fi
          git commit -m "Publish Gefahr $GITHUB_REF_NAME"
          git push

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Resolve image metadata
        id: image
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          tags="$image:$REF_NAME"
          if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tags="$tags"$'\n'"$image:latest"
          fi
          {
            echo "name=$image"
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          format: spdx-json
          output-file: image.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Attest image SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: image.spdx.json
          push-to-registry: true
      - name: Sign image digest
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
