name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build archives and checksums
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist/stage
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos=${target%/*}
            goarch=${target#*/}
            asset="gefahr_${VERSION#v}_${goos}_${goarch}"
            binary=goproxy
            if [ "$goos" = windows ]; then
              binary=goproxy.exe
            fi
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=$VERSION -X main.commit=${COMMIT:0:12}" \
              -o "dist/stage/$binary" ./cmd/goproxy
            if [ "$goos" = windows ]; then
              zip -j "dist/$asset.zip" "dist/stage/$binary"
            else
              tar -C dist/stage -czf "dist/$asset.tar.gz" "$binary"
            fi
            rm "dist/stage/$binary"
          done
          rmdir dist/stage
          (cd dist && sha256sum gefahr_* > checksums.txt)
      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/goproxy.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest binary provenance
        uses: actions/attest@v4
        with:
          subject-path: dist/gefahr_*
      - name: Attest binary SBOM
        uses: actions/attest@v4
        with:
          subject-path: dist/gefahr_*
          sbom-path: dist/goproxy.spdx.json
      - name: Create release when absent
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$REF_NAME" >/dev/null 2>&1; then
            exit 0
          fi
          prerelease_flag=()
          if [[ "$REF_NAME" == *-* ]]; then
            prerelease_flag+=(--prerelease)
          fi
          gh release create "$REF_NAME" --verify-tag --generate-notes --title "Gefahr $REF_NAME" "${prerelease_flag[@]}"
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image metadata
        id: image
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          tags="$image:$REF_NAME"
          if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tags="$tags"$'\n'"$image:latest"
          fi
          {
            echo "name=$image"
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Generate image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          format: spdx-json
          output-file: image.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Attest image SBOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: image.spdx.json
          push-to-registry: true
