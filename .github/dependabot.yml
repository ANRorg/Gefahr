version: 2
registries:
  npmjs:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/gefahr-docs"
    schedule:
      interval: "weekly"
    registries:
      - npmjs
    labels:
      - "dependencies"
